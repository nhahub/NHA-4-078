<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .profile-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .profile-sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .profile-content {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .address-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      position: relative;
    }
    .address-card .address-actions {
      position: absolute;
      top: 14px;
      right: 14px;
    }
    .default-badge {
      background: var(--green);
      color: #000;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 6px;
    }
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .order-status {
      font-weight: 600;
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 99px;
      background: rgba(0, 212, 255, 0.1);
      font-size: 13px;
    }
    .order-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0;
    }
    .order-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    @media (max-width: 800px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="profile">
  <nav>
    <div class="nav-logo">Data<span>Flow</span> Shop</div>
    <div class="nav-links">
      <!-- Dynamically filled in main.js -->
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">My Profile</h1>
    
    <div class="profile-grid">
      <!-- Left column: Sidebar / Add Address / Info -->
      <div class="profile-sidebar">
        <div class="card">
          <h3 style="font-family:var(--font-head);margin-bottom:8px;color:var(--accent);">User Details</h3>
          <p style="color:var(--text2);font-size:14px;margin-bottom:4px;">User ID: <span id="profileUser">-</span></p>
        </div>

        <div class="card">
          <h3 style="font-family:var(--font-head);margin-bottom:12px;">Add Address</h3>
          <div id="addressMsg"></div>
          <div class="form-group">
            <label class="form-label">Recipient Name</label>
            <input id="addrName" class="form-input" placeholder="e.g. John Doe" />
          </div>
          <div class="form-group">
            <label class="form-label">Street Address</label>
            <input id="addrStreet" class="form-input" placeholder="e.g. 123 Main St" />
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label class="form-label">City</label>
              <input id="addrCity" class="form-input" placeholder="City" />
            </div>
            <div class="form-group" style="flex:1;">
              <label class="form-label">State</label>
              <input id="addrState" class="form-input" placeholder="State" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label class="form-label">Postal Code</label>
              <input id="addrZip" class="form-input" placeholder="Zip" />
            </div>
            <div class="form-group" style="flex:1;">
              <label class="form-label">Country</label>
              <input id="addrCountry" class="form-input" placeholder="Country" />
            </div>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:6px;">
            <input id="addrDefault" type="checkbox" style="width:auto;" />
            <label for="addrDefault" class="form-label" style="margin-bottom:0;">Set as Default</label>
          </div>
          <button id="addAddressBtn" class="btn-primary" style="width:100%;">Save Address</button>
        </div>
      </div>

      <!-- Right column: Main profile content tabs -->
      <div class="profile-content">
        <!-- Addresses list -->
        <section class="card">
          <h2 class="page-title" style="font-size:22px;margin-bottom:12px;">Saved Addresses</h2>
          <div id="addressesList" class="loading">Loading addresses...</div>
        </section>

        <!-- Wishlist -->
        <section class="card">
          <h2 class="page-title" style="font-size:22px;margin-bottom:12px;">My Wishlist</h2>
          <div id="wishlistContainer" class="wishlist-grid loading">Loading wishlist...</div>
        </section>

        <!-- Recently Viewed -->
        <section class="card" id="recentlyViewedSection" style="display:none;">
          <h2 class="page-title" style="font-size:22px;margin-bottom:12px;">Recently Viewed Products</h2>
          <div id="recentRecs" class="wishlist-grid loading">Loading recently viewed...</div>
        </section>

        <!-- Order History -->
        <section class="card">
          <h2 class="page-title" style="font-size:22px;margin-bottom:12px;">Order History & Tracking</h2>
          <div id="orders" class="loading">Loading orders...</div>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
