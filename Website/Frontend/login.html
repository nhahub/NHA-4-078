<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body data-page="login">
  <nav>
    <div class="nav-logo">Data<span>Flow</span> Shop</div>
    <div class="nav-links">
      <a class="nav-btn" href="./index.html">Home</a>
      <a class="nav-cta" href="./signup.html">Signup</a>
    </div>
  </nav>
  <main class="container">
    <div class="auth-wrap">
      <div class="auth-card">
        <h1 class="auth-title">Login</h1>
        <p class="auth-sub">Sign in to continue</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" class="form-input" type="email" placeholder="Email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" class="form-input" type="password" placeholder="Password" />
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin: 15px 0;">
          <input id="remember" type="checkbox" style="width: auto; cursor: pointer;" />
          <label for="remember" class="form-label" style="margin-bottom: 0; cursor: pointer; user-select: none;">Remember Me</label>
        </div>
        <button class="btn-primary" id="loginBtn" style="width: 100%;">Login</button>
        <div id="loginMsg"></div>
      </div>
    </div>
  </main>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
