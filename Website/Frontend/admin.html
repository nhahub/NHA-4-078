<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 25px 0;
    }
    .analytics-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .analytics-card h3 {
      font-family: var(--font-head);
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .analytics-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .analytics-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      background: var(--bg3);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .analytics-item span:first-child {
      color: var(--text);
      font-weight: 500;
    }
    .analytics-item span:last-child {
      color: var(--green);
      font-weight: 600;
    }
    .admin-stats-large {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 800px) {
      .analytics-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="admin">
  <nav>
    <div class="nav-logo">Data<span>Flow</span> Shop</div>
    <div class="nav-links">
      <!-- Dynamically filled in main.js -->
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Admin Dashboard & Behavior Analytics</h1>
    
    <!-- Primary Stats Cards -->
    <div id="stats" class="loading">Loading dashboard stats...</div>

    <!-- Real-time Pipeline Telemetry -->
    <div style="margin:30px 0 40px 0;">
      <h2 class="page-title" style="font-size:22px; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:8px;">Real-Time Pipeline Telemetry</h2>
      <div id="pipelineStats" class="metrics-grid">
        <!-- Rendered in main.js -->
      </div>
    </div>

    <!-- Analytics / Telemetry Panels -->
    <div class="analytics-grid">
      <!-- Top Searches -->
      <div class="analytics-card">
        <h3>Top Searched Terms</h3>
        <div id="topSearches" class="analytics-list">
          <p class="loading">Loading searches...</p>
        </div>
      </div>

      <!-- Most Viewed Products -->
      <div class="analytics-card">
        <h3>Most Viewed Products</h3>
        <div id="topViewed" class="analytics-list">
          <p class="loading">Loading product views...</p>
        </div>
      </div>
    </div>

    <h2 class="page-title" style="font-size:22px; margin-top:30px;">Products List</h2>
    <div id="adminProducts" class="courses-grid"></div>

    <h2 class="page-title" style="font-size:22px; margin-top:30px;">Recent Orders</h2>
    <div id="adminOrders"></div>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
